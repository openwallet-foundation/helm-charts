apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "endorser-service.fullname" . }}-migrate
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "endorser-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- $annotations := include "endorser-service.renderAnnotations" (dict "context" . "annotations" (dict "helm.sh/hook" "post-install,post-upgrade" "helm.sh/hook-weight" "0" "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded")) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "endorser-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- $serviceAccountName := include "endorser-service.serviceAccountName" . }}
      {{- if $serviceAccountName }}
      serviceAccountName: {{ $serviceAccountName }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.migration.initContainer.image }}:{{ .Values.migration.initContainer.tag }}"
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z {{ include "endorser-service.db.host" . }} {{ include "endorser-service.db.port" . }}; do echo waiting for db; sleep 2; done;
        {{- if .Values.postgres.enabled }}
        # Sync customAdminUser password from the chart secret and repair ownership on
        # upgrades (initdb.scripts only run on empty PVC). First-boot role creation
        # lives in postgres.initdb.scripts (01-init-endorser-roles.sh).
        - name: ensure-db-roles
          image: "{{ .Values.postgres.image.registry }}/{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PGHOST
              value: {{ include "endorser-service.db.host" . | quote }}
            - name: PGPORT
              value: {{ include "endorser-service.db.port" . | quote }}
            - name: PGDATABASE
              value: {{ include "endorser-service.db.database" . | quote }}
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "endorser-service.db.secretName" . }}
                  key: {{ .Values.postgres.auth.secretKeys.adminPasswordKey | default "postgres-password" | quote }}
            - name: APP_USER
              value: {{ include "endorser-service.db.username" . | quote }}
            - name: ADMIN_USER
              value: {{ include "endorser-service.db.adminUser" . | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "endorser-service.db.secretName" . }}
                  key: {{ include "endorser-service.db.adminPasswordKey" . | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "Syncing customAdminUser '${ADMIN_USER}' (password + grants + ownership repair)"
              psql -v ON_ERROR_STOP=1 \
                -v APP_USER="${APP_USER}" \
                -v ADMIN_USER="${ADMIN_USER}" \
                -v ADMIN_PASSWORD="${ADMIN_PASSWORD}" <<'EOSQL'
              SELECT quote_ident(:'APP_USER') AS app_user \gset
              SELECT quote_ident(:'ADMIN_USER') AS admin_user \gset
              SELECT quote_literal(:'ADMIN_PASSWORD') AS admin_password \gset
              SELECT quote_ident(current_database()) AS dbname \gset

              SELECT EXISTS(SELECT 1 FROM pg_roles WHERE rolname = :'ADMIN_USER') AS admin_exists \gset
              \if :admin_exists
                ALTER ROLE :admin_user WITH LOGIN PASSWORD :admin_password;
              \else
                CREATE ROLE :admin_user LOGIN PASSWORD :admin_password;
              \endif

              ALTER DATABASE :dbname OWNER TO :admin_user;
              GRANT CONNECT ON DATABASE :dbname TO :app_user;
              GRANT ALL ON SCHEMA public TO :admin_user;
              GRANT USAGE ON SCHEMA public TO :app_user;
              ALTER DEFAULT PRIVILEGES FOR ROLE :admin_user IN SCHEMA public
                GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO :app_user;
              ALTER DEFAULT PRIVILEGES FOR ROLE :admin_user IN SCHEMA public
                GRANT USAGE, SELECT ON SEQUENCES TO :app_user;
              ALTER DEFAULT PRIVILEGES FOR ROLE :admin_user IN SCHEMA public
                GRANT EXECUTE ON FUNCTIONS TO :app_user;
              -- Repair tables left owned by the app user or postgres (pre-fix installs)
              REASSIGN OWNED BY :app_user TO :admin_user;
              REASSIGN OWNED BY postgres TO :admin_user;
              EOSQL
              echo "Database roles ready"
        {{- end }}

      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh","-c"]
          args: ["python3 -m alembic upgrade head"]
          {{- with .Values.migration.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ACAPY_ADMIN_URL
              value: {{ include "endorser-service.acapy.adminUrl" . | quote }}
            - name: CONTROLLER_POSTGRESQL_HOST
              value: {{ include "endorser-service.db.host" . | quote }}
            - name: CONTROLLER_POSTGRESQL_PORT
              value: {{ include "endorser-service.db.port" . | quote }}
            - name: CONTROLLER_POSTGRESQL_DB
              value: {{ include "endorser-service.db.database" . | quote }}
            - name: CONTROLLER_POSTGRESQL_USER
              value: {{ include "endorser-service.db.username" . | quote }}
            - name: CONTROLLER_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "endorser-service.db.secretName" . }}
                  key: {{ include "endorser-service.db.userPasswordKey" . | quote }}
            - name: CONTROLLER_POSTGRESQL_ADMIN_USER
              value: {{ include "endorser-service.db.adminUser" . | quote }}
            - name: CONTROLLER_POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "endorser-service.db.secretName" . }}
                  key: {{ include "endorser-service.db.adminPasswordKey" . | quote }}
