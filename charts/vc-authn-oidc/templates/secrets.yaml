{{- if and (include "vc-authn-oidc.database.createSecret" .) .Values.mongodb.enabled -}}
{{ $databaseSecretName := (include "vc-authn-oidc.databaseSecretName" .) }}
{{ $mongoRootPassword := include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" $databaseSecretName "Key" "mongodb-root-password" "Length" 32) }}
{{ $mongoUserPassword := include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" $databaseSecretName "Key" "mongodb-password" "Length" 32) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $databaseSecretName }}
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
  {{- if .Values.database.retainOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  mongodb-root-password: {{ $mongoRootPassword }}
  mongodb-password: {{ $mongoUserPassword }}
  mongodb-user: {{ (first .Values.mongodb.customUsers).name | b64enc | quote }}
  mongodb-database: {{ (first .Values.mongodb.customUsers).database | b64enc | quote }}
{{- end }}
{{- if (include "vc-authn-oidc.externalMongodb.createSecret" .) -}}
{{- $externalMongoSecretName := include "vc-authn-oidc.mongodb.secretName" . -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $externalMongoSecretName }}
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
  {{- if .Values.externalMongodb.auth.retainOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  mongodb-password: {{ .Values.externalMongodb.auth.password | b64enc }}
{{- end }}
{{- $apiSecretName := include "vc-authn-oidc.apiSecretName" . -}}
{{- $controllerApiKey := include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" $apiSecretName "Key" "controllerApiKey" "Length" 32) -}}
{{- if (include "vc-authn-oidc.api.createSecret" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $apiSecretName }}
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
  {{- if .Values.auth.api.retainOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  controllerApiKey: {{ $controllerApiKey }}
{{- end }}
{{- if .Values.acapy.enabled }}
{{- $webhookSecretName := include "vc-authn-oidc.webhookSecretName" . -}}
{{- $controllerUrl := printf "http://%s:%v/webhooks" (include "global.fullname" .) (.Values.service.port | int) -}}
{{- $webhookUrl := printf "%s#%s" $controllerUrl ($controllerApiKey | b64dec) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $webhookSecretName }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
    app.kubernetes.io/component: acapy
type: Opaque
data:
  ACAPY_WEBHOOK_URL: {{ $webhookUrl | b64enc | quote }}
{{- end }}
{{- if (include "vc-authn-oidc.externalRedis.createSecret" .) -}}
{{- $externalRedisSecretName := include "vc-authn-oidc.externalRedis.secretName" . -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $externalRedisSecretName }}
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
  {{- if .Values.externalRedis.auth.retainOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  redis-password: {{ .Values.externalRedis.auth.password | b64enc }}
{{- end }}
{{- if not .Values.siem.existingSecret -}}
{{- $siemSecretName := include "vc-authn-oidc.siemSecretName" . -}}
{{- $ipSalt := .Values.siem.ipSalt | default (include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" $siemSecretName "Key" "ip-salt" "Length" 32)) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $siemSecretName }}
  labels:
    {{- include "vc-authn-oidc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  ip-salt: {{ $ipSalt | b64enc }}
{{- end }}
